<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenixSuit</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans CJK SC', 'Noto Sans SC', 'WenQuanYi Micro Hei', 'PingFang SC', 'Microsoft YaHei', 'SimHei', Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #11111b;
        color: #cdd6f4;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #181825;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #313244;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #45475a;
      }
      
      ::selection {
        background: #89b4fa;
        color: #1e1e2e;
      }
      
      select {
        background-color: #313244;
        color: #cdd6f4;
        border: 1px solid #45475a;
        border-radius: 6px;
        cursor: pointer;
      }
      
      select:focus {
        outline: none;
        border-color: #89b4fa;
      }
      
      select option {
        background-color: #1e1e2e;
        color: #cdd6f4;
      }
      
      select option:hover,
      select option:focus,
      select option:active,
      select option:checked {
        background-color: #313244;
        color: #89b4fa;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
